{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Virginia Petitions{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    {% tailwind_css %}
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">
    <header class="border-b-2 border-gray-800 mb-8">
        <nav class="max-w-5xl mx-auto px-4 py-4 flex gap-6 text-sm font-medium">
            <a href="{% url 'pages:home' %}" class="text-gray-800 hover:text-red-800 transition-colors">Home</a>
            <a href="{% url 'petitions:petition_list' %}" class="text-gray-800 hover:text-red-800 transition-colors">Petitions</a>
            <a href="{% url 'petitions:map' %}" class="text-gray-800 hover:text-red-800 transition-colors">Map</a>
            <a href="{% url 'petitions:county_list' %}" class="text-gray-800 hover:text-red-800 transition-colors">Counties</a>
            <a href="{% url 'pages:teaching' %}" class="text-gray-800 hover:text-red-800 transition-colors">Teaching</a>
            <a href="{% url 'pages:about' %}" class="text-gray-800 hover:text-red-800 transition-colors">About</a>
        </nav>
    </header>

    <main class="max-w-5xl mx-auto px-4 min-h-[60vh]">
        {% block content %}{% endblock %}
    </main>

    <footer class="max-w-5xl mx-auto px-4 mt-12 py-4 border-t border-gray-300 text-gray-500 text-sm">
        <p>Library of Virginia Petitions Project</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
